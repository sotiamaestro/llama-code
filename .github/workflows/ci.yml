name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-targets

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for hardcoded secrets
        run: |
          echo "Scanning for API key patterns..."
          FOUND=0
          for pattern in "sk-[a-zA-Z0-9]" "hf_[a-zA-Z0-9]" "ghp_[a-zA-Z0-9]" "gho_[a-zA-Z0-9]"; do
            if grep -rn "$pattern" . --include="*.rs" --include="*.toml" --include="*.yml" --include="*.yaml" --include="*.sh" --include="*.json" | grep -v "target/" | grep -v ".git/" | grep -v "ci.yml"; then
              echo "FOUND SECRET PATTERN: $pattern"
              FOUND=1
            fi
          done
          if [ $FOUND -eq 1 ]; then
            echo "::error::Potential secrets found in codebase!"
            exit 1
          fi
          echo "✓ No secrets found"
      - name: Scan for hardcoded paths
        run: |
          if grep -rn "/Users/\|/home/[a-z]" . --include="*.rs" --include="*.toml" --include="*.yml" --include="*.sh" | grep -v "target/" | grep -v ".git/" | grep -v "XDG\|HOME\|ci.yml"; then
            echo "::error::Hardcoded paths found!"
            exit 1
          fi
          echo "✓ No hardcoded paths found"

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --release
